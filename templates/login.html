{% extends "base.html" %}
{% block title %}Sign in · Voter Match{% endblock %}
{% block content %}
<section class="card">
  <h1>Volunteer sign-in</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="{{ url_for('login_submit') }}">
    <label>Access code <input name="access_code" required autocomplete="off"></label>
    <label>Phone <input name="phone" type="tel" required autocomplete="tel"></label>
    <button type="submit">Sign in</button>
  </form>

  <h2>Admin sign-in</h2>
  <form method="post" action="{{ url_for('admin_login') }}">
    <label>Admin code <input name="admin_code" required autocomplete="off"></label>
    <button type="submit">Sign in as admin</button>
  </form>

  <p class="hint">
    Demo: access code <code>DEMO01</code>, admin code <code>ADMIN1</code>.
    Rotate before any shared-environment use.
  </p>
</section>
{% endblock %}
