name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API (Worker + D1 migrations)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck API
        working-directory: apps/api
        run: pnpm typecheck

      - name: Apply D1 migrations (remote)
        working-directory: apps/api
        run: pnpm exec wrangler d1 migrations apply voter_match --remote

      - name: Deploy Worker
        working-directory: apps/api
        run: pnpm exec wrangler deploy

  deploy-web:
    name: Deploy web (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: deploy-api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: apps/web
        env:
          # Full URL of the deployed Worker, including the /api prefix
          # (e.g. https://voter-match-api.<subdomain>.workers.dev/api).
          # Leave unset to keep the default "/api" (requires same-origin routing
          # via a _redirects proxy or a custom domain).
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        run: >-
          pnpm exec wrangler pages deploy dist
          --project-name=${{ vars.CF_PAGES_PROJECT || 'voter-match' }}
          --branch=main
